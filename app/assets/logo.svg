<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Purple ink brush gradient for the crescent -->
    <linearGradient id="purpleCrescent" x1="20%" y1="15%" x2="80%" y2="85%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Gold brush gradient for the right arc -->
    <linearGradient id="goldArc" x1="80%" y1="10%" x2="95%" y2="80%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c8956a"/>
    </linearGradient>
    <!-- Star purple gradient with brush texture feel -->
    <linearGradient id="starPurpleTop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="starPurpleRight" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="starPurpleBottom" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="starPurpleLeft" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Gold edge highlight for star -->
    <linearGradient id="goldEdgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Cloud gradient -->
    <radialGradient id="cloudPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <!-- Gold speckle gradient -->
    <radialGradient id="goldSpeckle" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="starShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#3b0764" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===== OUTER RINGS ===== -->
  <!-- Left purple crescent (thick ink brush style) -->
  <path d="M 256 35 
           C 155 35, 70 85, 45 170 
           C 22 250, 28 340, 65 415 
           C 95 470, 145 495, 195 492
           C 218 490, 238 482, 256 470"
        fill="none" stroke="url(#purpleCrescent)" stroke-width="32" stroke-linecap="round" opacity="0.88"
        filter="url(#inkBlur)"/>
  <!-- Purple crescent edge highlight -->
  <path d="M 256 35 
           C 155 35, 70 85, 45 170 
           C 22 250, 28 340, 65 415 
           C 95 470, 145 495, 195 492
           C 218 490, 238 482, 256 470"
        fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Brush texture on left crescent - rough edges -->
  <path d="M 50 155 Q 40 170 42 185" stroke="#8b5cf6" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 42 200 Q 35 215 38 230" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M 55 310 Q 48 325 52 340" stroke="#8b5cf6" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 70 370 Q 62 385 68 400" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M 100 420 Q 95 435 105 445" stroke="#8b5cf6" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M 140 460 Q 135 470 145 478" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M 180 478 Q 178 485 185 490" stroke="#8b5cf6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.15"/>

  <!-- Right gold arc (thinner, dry brush style) -->
  <path d="M 256 35 
           C 355 35, 440 85, 465 170 
           C 488 250, 482 340, 445 415 
           C 415 470, 365 495, 315 492
           C 292 490, 272 482, 256 470"
        fill="none" stroke="url(#goldArc)" stroke-width="10" stroke-linecap="round" opacity="0.55"
        filter="url(#inkBlur)"/>
  <!-- Dry brush gaps on gold arc -->
  <path d="M 370 60 Q 390 50 410 55" stroke="#d4a574" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M 445 170 Q 450 190 448 210" stroke="#c8956a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.15"/>
  <path d="M 460 320 Q 455 340 450 360" stroke="#d4a574" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.15"/>
  <path d="M 420 430 Q 400 445 380 448" stroke="#c8956a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- ===== INNER RINGS ===== -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#purpleCrescent)" stroke-width="2.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="url(#goldArc)" stroke-width="2" opacity="0.35"/>

  <!-- ===== FOUR-POINTED STAR (ink brush style with curves) ===== -->
  <!-- Top blade - curved like ink brush, wider at base, tapered to sharp tip -->
  <path d="M 242 256 
           C 235 210, 238 140, 244 95 
           C 246 78, 250 55, 253 38 
           C 254 32, 255.5 26, 256 22
           C 256.5 26, 258 32, 259 38
           C 262 55, 266 78, 268 95
           C 274 140, 277 210, 270 256 Z"
        fill="url(#starPurpleTop)" stroke="url(#goldEdgeGrad)" stroke-width="0.8" filter="url(#starShadow)" opacity="0.92"/>
  <!-- Gold edge highlight on top blade right side -->
  <path d="M 256 22 C 258 32, 262 55, 268 95 C 274 140, 277 210, 270 256"
        fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>

  <!-- Right blade -->
  <path d="M 256 242 
           C 300 235, 370 238, 415 244 
           C 432 246, 455 250, 472 253 
           C 478 254, 484 255.5, 488 256
           C 484 256.5, 478 258, 472 259
           C 455 262, 432 266, 415 268
           C 370 274, 300 277, 256 270 Z"
        fill="url(#starPurpleRight)" stroke="url(#goldEdgeGrad)" stroke-width="0.8" filter="url(#starShadow)" opacity="0.92"/>
  <path d="M 488 256 C 478 258, 455 262, 415 268 C 370 274, 300 277, 256 270"
        fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>

  <!-- Bottom blade -->
  <path d="M 270 256 
           C 277 300, 274 370, 268 415 
           C 266 432, 262 455, 259 472 
           C 258 478, 256.5 484, 256 488
           C 255.5 484, 254 478, 253 472
           C 250 455, 246 432, 244 415
           C 238 370, 235 300, 242 256 Z"
        fill="url(#starPurpleBottom)" stroke="url(#goldEdgeGrad)" stroke-width="0.8" filter="url(#starShadow)" opacity="0.92"/>
  <path d="M 256 488 C 254 478, 250 455, 244 415 C 238 370, 235 300, 242 256"
        fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>

  <!-- Left blade -->
  <path d="M 256 270 
           C 212 277, 142 274, 97 268 
           C 80 266, 57 262, 40 259 
           C 34 258, 28 256.5, 24 256
           C 28 255.5, 34 254, 40 253
           C 57 250, 80 246, 97 244
           C 142 238, 212 235, 256 242 Z"
        fill="url(#starPurpleLeft)" stroke="url(#goldEdgeGrad)" stroke-width="0.8" filter="url(#starShadow)" opacity="0.92"/>
  <path d="M 24 256 C 34 254, 57 250, 97 244 C 142 238, 212 235, 256 242"
        fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>

  <!-- Star center intersection glow -->
  <circle cx="256" cy="256" r="10" fill="#d4a574" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="256" cy="256" r="2.5" fill="#fef3c7" opacity="0.9"/>

  <!-- ===== CLOUD DECORATIONS ===== -->
  <!-- Top-left cloud cluster -->
  <g opacity="0.75" filter="url(#inkBlur)">
    <path d="M 75 105 
             C 75 90, 95 82, 102 92 
             C 108 78, 130 72, 138 88 
             C 152 84, 168 96, 160 112 
             C 166 128, 154 142, 140 136 
             C 132 148, 110 146, 102 136 
             C 90 142, 74 132, 80 118 
             C 74 114, 70 108, 75 105 Z"
          fill="url(#cloudPurple)" opacity="0.8"/>
    <path d="M 95 100 
             C 95 92, 108 88, 112 96 
             C 116 86, 132 82, 136 92 
             C 144 90, 152 98, 146 108 
             C 150 118, 142 126, 132 122 
             C 126 130, 110 128, 104 120 
             C 96 124, 88 116, 92 108 
             C 88 106, 90 102, 95 100 Z"
          fill="#ddd6fe" opacity="0.4"/>
    <!-- Small cloud puff -->
    <path d="M 58 120 C 58 114, 68 110, 72 116 C 76 108, 86 106, 90 114 
             C 96 112, 100 118, 96 124 C 100 130, 92 134, 86 130 
             C 80 134, 70 132, 68 126 C 62 128, 56 124, 58 120 Z"
          fill="url(#cloudPurple)" opacity="0.5"/>
  </g>

  <!-- Bottom-right cloud cluster -->
  <g opacity="0.75" filter="url(#inkBlur)">
    <path d="M 380 370 
             C 380 355, 400 347, 408 357 
             C 414 343, 436 337, 444 353 
             C 458 349, 474 361, 466 377 
             C 472 393, 460 407, 446 401 
             C 438 413, 416 411, 408 401 
             C 396 407, 380 397, 386 383 
             C 380 379, 376 373, 380 370 Z"
          fill="url(#cloudPurple)" opacity="0.8"/>
    <path d="M 400 365 
             C 400 357, 414 353, 418 361 
             C 422 351, 438 347, 442 357 
             C 450 355, 458 363, 452 373 
             C 456 383, 448 391, 438 387 
             C 432 395, 416 393, 410 385 
             C 402 389, 394 381, 398 373 
             C 394 371, 396 367, 400 365 Z"
          fill="#ddd6fe" opacity="0.4"/>
    <!-- Small cloud puff -->
    <path d="M 362 385 C 362 379, 372 375, 376 381 C 380 373, 390 371, 394 379 
             C 400 377, 404 383, 400 389 C 404 395, 396 399, 390 395 
             C 384 399, 374 397, 372 391 C 366 393, 360 389, 362 385 Z"
          fill="url(#cloudPurple)" opacity="0.5"/>
  </g>

  <!-- ===== GOLD SPECKLES / INK SPLATTERS ===== -->
  <!-- Left side gold splatters -->
  <circle cx="70" cy="80" r="3" fill="url(#goldSpeckle)" opacity="0.6"/>
  <circle cx="90" cy="60" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="50" cy="105" r="2.5" fill="#d4a574" opacity="0.25"/>
  <circle cx="120" cy="50" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="105" cy="70" r="1.5" fill="#d4a574" opacity="0.2"/>
  <circle cx="55" cy="130" r="1.8" fill="#fbbf24" opacity="0.25"/>
  <circle cx="80" cy="150" r="2" fill="#d4a574" opacity="0.2"/>
  <circle cx="45" cy="170" r="1.5" fill="#fbbf24" opacity="0.2"/>
  <circle cx="60" cy="200" r="2.2" fill="#d4a574" opacity="0.3"/>
  <circle cx="75" cy="230" r="1.5" fill="#fbbf24" opacity="0.25"/>
  <circle cx="55" cy="270" r="2" fill="#d4a574" opacity="0.2"/>
  <circle cx="70" cy="310" r="1.8" fill="#fbbf24" opacity="0.25"/>
  <circle cx="85" cy="350" r="2.5" fill="#d4a574" opacity="0.3"/>
  <circle cx="100" cy="390" r="2" fill="#fbbf24" opacity="0.2"/>
  <circle cx="115" cy="420" r="1.5" fill="#d4a574" opacity="0.25"/>
  <circle cx="130" cy="450" r="2" fill="#fbbf24" opacity="0.2"/>
  <circle cx="160" cy="470" r="1.8" fill="#d4a574" opacity="0.2"/>
  <circle cx="190" cy="480" r="1.5" fill="#fbbf24" opacity="0.15"/>

  <!-- Right side gold splatters -->
  <circle cx="430" cy="70" r="2.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="455" cy="90" r="2" fill="#d4a574" opacity="0.25"/>
  <circle cx="470" cy="120" r="1.8" fill="#fbbf24" opacity="0.2"/>
  <circle cx="460" cy="160" r="2" fill="#d4a574" opacity="0.25"/>
  <circle cx="475" cy="200" r="1.5" fill="#fbbf24" opacity="0.2"/>
  <circle cx="465" cy="240" r="2" fill="#d4a574" opacity="0.2"/>
  <circle cx="470" cy="280" r="1.8" fill="#fbbf24" opacity="0.25"/>
  <circle cx="455" cy="320" r="2.2" fill="#d4a574" opacity="0.2"/>
  <circle cx="460" cy="360" r="1.5" fill="#fbbf24" opacity="0.2"/>
  <circle cx="440" cy="395" r="2" fill="#d4a574" opacity="0.25"/>
  <circle cx="420" cy="430" r="1.8" fill="#fbbf24" opacity="0.2"/>
  <circle cx="395" cy="455" r="2" fill="#d4a574" opacity="0.2"/>
  <circle cx="370" cy="470" r="1.5" fill="#fbbf24" opacity="0.2"/>
  <circle cx="340" cy="478" r="1.8" fill="#d4a574" opacity="0.15"/>

  <!-- Purple speckles near clouds -->
  <circle cx="60" cy="95" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="75" cy="115" r="1.5" fill="#7c3aed" opacity="0.25"/>
  <circle cx="145" cy="90" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="160" cy="110" r="2" fill="#7c3aed" opacity="0.25"/>
  <circle cx="380" cy="370" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="395" cy="390" r="1.5" fill="#7c3aed" opacity="0.25"/>
  <circle cx="450" cy="355" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="465" cy="375" r="2" fill="#7c3aed" opacity="0.25"/>
</svg>
